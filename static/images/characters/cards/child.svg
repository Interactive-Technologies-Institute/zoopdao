<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.08 226.77" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgb(var(--zd-text))" />
      <stop offset="0.55" stop-color="rgb(var(--zd-primary-active))" />
      <stop offset="1" stop-color="rgb(var(--zd-primary-hover))" />
    </linearGradient>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="rgb(var(--zd-focus))" opacity="0.10" />
    </pattern>
  </defs>

  <rect width="170.08" height="226.77" fill="url(#bg)" />
  <rect width="170.08" height="226.77" fill="url(#dots)" />
  <rect x="10" y="10" width="150.08" height="206.77" rx="14" stroke="rgb(var(--zd-border))" opacity="0.28" />

  <circle cx="85.04" cy="54" r="26" fill="rgb(var(--zd-bg-deep))" opacity="0.55" />
  <circle cx="85.04" cy="54" r="22" fill="rgb(var(--zd-primary-hover))" opacity="0.95" />

  <!-- playful fish + bubble -->
  <path
    d="M70 58c0-8 8-14 18-14 8 0 14 4 18 10-3 6-10 10-18 10-4 0-8-1-11-3l-7 7"
    stroke="rgb(var(--zd-bg))"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />
  <circle cx="97" cy="50" r="3.5" fill="rgb(var(--zd-bg))" opacity="0.9" />
  <circle cx="102" cy="43" r="3.3" stroke="rgb(var(--zd-focus))" stroke-width="2.5" opacity="0.55" />

  <path d="M-10 170 C 18 148, 52 196, 90 170 S 146 160, 214 194" stroke="rgb(var(--zd-focus))" stroke-width="12" opacity="0.14" stroke-linecap="round" />
  <path d="M-10 198 C 20 172, 56 214, 92 184 S 148 174, 214 210" stroke="rgb(var(--zd-surface))" stroke-width="7" opacity="0.10" stroke-linecap="round" />
</svg>
