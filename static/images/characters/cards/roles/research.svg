<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.08 226.77" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgb(var(--zd-text))" />
      <stop offset="0.55" stop-color="rgb(var(--zd-primary-active))" />
      <stop offset="1" stop-color="rgb(var(--zd-primary-hover))" />
    </linearGradient>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="rgb(var(--zd-focus))" opacity="0.12" />
    </pattern>
  </defs>

  <rect width="170.08" height="226.77" fill="url(#bg)" />
  <rect width="170.08" height="226.77" fill="url(#dots)" />
  <rect x="10" y="10" width="150.08" height="206.77" rx="14" stroke="rgb(var(--zd-border))" opacity="0.28" />

  <circle cx="85.04" cy="54" r="26" fill="rgb(var(--zd-bg-deep))" opacity="0.55" />
  <circle cx="85.04" cy="54" r="22" fill="rgb(var(--zd-primary-hover))" opacity="0.95" />

  <!-- microscope -->
  <circle cx="92" cy="44" r="5.5" stroke="rgb(var(--zd-bg))" stroke-width="4" opacity="0.9" />
  <path d="M88.5 48.5l-10 10" stroke="rgb(var(--zd-bg))" stroke-width="4" stroke-linecap="round" opacity="0.9" />
  <path d="M80 60l10 10" stroke="rgb(var(--zd-bg))" stroke-width="4" stroke-linecap="round" opacity="0.9" />
  <path d="M74 66h30" stroke="rgb(var(--zd-bg))" stroke-width="6" stroke-linecap="round" opacity="0.9" />
  <path
    d="M78 66c0-9 6-14 14-14"
    stroke="rgb(var(--zd-focus))"
    stroke-width="4"
    stroke-linecap="round"
    opacity="0.35"
  />
  <circle cx="100" cy="66" r="3" fill="rgb(var(--zd-focus))" opacity="0.35" />

  <path d="M-10 170 C 18 146, 52 190, 88 166 S 142 154, 214 188" stroke="rgb(var(--zd-focus))" stroke-width="12" opacity="0.16" stroke-linecap="round" />
  <path d="M-10 198 C 20 172, 56 214, 92 184 S 148 174, 214 210" stroke="rgb(var(--zd-surface))" stroke-width="7" opacity="0.10" stroke-linecap="round" />
</svg>
