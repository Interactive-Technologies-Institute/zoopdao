<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.08 226.77" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgb(var(--zd-bg-deep))" />
      <stop offset="0.55" stop-color="rgb(var(--zd-primary-active))" />
      <stop offset="1" stop-color="rgb(var(--zd-border))" />
    </linearGradient>
    <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="rgb(var(--zd-surface))" opacity="0.10" />
    </pattern>
  </defs>

  <rect width="170.08" height="226.77" fill="url(#bg)" />
  <rect width="170.08" height="226.77" fill="url(#dots)" />
  <rect x="10" y="10" width="150.08" height="206.77" rx="14" stroke="rgb(var(--zd-border))" opacity="0.30" />

  <circle cx="85.04" cy="54" r="26" fill="rgb(var(--zd-text))" opacity="0.55" />
  <circle cx="85.04" cy="54" r="22" fill="rgb(var(--zd-border))" opacity="0.95" />

  <!-- bird profile -->
  <path d="M70 68c8-14 18-20 32-17 6 1 10 4 12 7-6 1-12 4-15 9-3 5-6 10-15 10H70Z" stroke="rgb(var(--zd-bg))" stroke-width="4" stroke-linejoin="round" opacity="0.9" />
  <path d="M88 44l8-4" stroke="rgb(var(--zd-bg))" stroke-width="4" stroke-linecap="round" opacity="0.9" />
  <circle cx="89" cy="55" r="2.2" fill="rgb(var(--zd-bg))" opacity="0.9" />

  <path d="M-10 170 C 14 148, 52 196, 90 170 S 146 160, 214 194" stroke="rgb(var(--zd-surface-muted))" stroke-width="12" opacity="0.14" stroke-linecap="round" />
  <path d="M-10 198 C 20 172, 56 214, 92 184 S 148 174, 214 210" stroke="rgb(var(--zd-primary-hover))" stroke-width="7" opacity="0.10" stroke-linecap="round" />
</svg>
