<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 700">
  <defs>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.25"></feDropShadow>
    </filter>

    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f2f2f"></stop>
      <stop offset="1" stop-color="#242424"></stop>
    </linearGradient>

    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a3a3a"></stop>
      <stop offset="1" stop-color="#2d2d2d"></stop>
    </linearGradient>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.18"></feDropShadow>
    </filter>
  </defs>

  <g id="history-panel" filter="url(#panelShadow)">
    <!-- panel body -->
    <rect x="26" y="22" width="808" height="656" rx="24" fill="url(#panelGrad)"></rect>
    <rect x="26" y="22" width="808" height="656" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"></rect>

    <!-- header -->
    <rect x="26" y="22" width="808" height="84" rx="24" fill="url(#headerGrad)"></rect>
    <line x1="26" y1="106" x2="834" y2="106" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"></line>

    <text x="70" y="74" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" fill="#f2f2f2" opacity="0.92">Message history</text>

    <!-- close button -->
    <g id="btn-close-history" transform="translate(764,44)">
      <circle cx="28" cy="28" r="22" fill="#3f3f3f"></circle>
      <circle cx="28" cy="28" r="21" fill="none" stroke="#ffffff" stroke-opacity="0.10"></circle>
      <path d="M20 20 L36 36 M36 20 L20 36" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.9"></path>
    </g>

    <!-- scroll area -->
    <rect x="54" y="130" width="752" height="520" rx="18" fill="#1f1f1f" opacity="0.65"></rect>
    <rect x="54" y="130" width="752" height="520" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"></rect>

    <!-- message cards (mock) -->
    <!-- user -->
    <g filter="url(#cardShadow)">
      <rect x="84" y="160" width="640" height="92" rx="16" fill="#353535"></rect>
      <rect x="84" y="160" width="640" height="92" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.10"></rect>
      <text x="110" y="195" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" fill="#eaeaea" opacity="0.85">
        You
      </text>
      <text x="110" y="222" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="20" fill="#ffffff" opacity="0.92">
        Show me the assembly scene without the balloon.
      </text>
    </g>

    <!-- assistant -->
    <g filter="url(#cardShadow)">
      <rect x="136" y="270" width="640" height="118" rx="16" fill="#2a3a3d"></rect>
      <rect x="136" y="270" width="640" height="118" rx="16" fill="none" stroke="#c8fbff" stroke-opacity="0.12"></rect>
      <text x="162" y="305" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" fill="#c8fbff" opacity="0.85">
        Guide
      </text>
      <text x="162" y="332" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="20" fill="#ffffff" opacity="0.92">
        Done — removed ChatBubble symbol and active bubble use.
      </text>
      <text x="162" y="358" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" fill="#ffffff" opacity="0.75">
        Click the history icon anytime to review messages.
      </text>
    </g>

    <!-- user -->
    <g filter="url(#cardShadow)">
      <rect x="84" y="410" width="640" height="92" rx="16" fill="#353535"></rect>
      <rect x="84" y="410" width="640" height="92" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.10"></rect>
      <text x="110" y="445" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" fill="#eaeaea" opacity="0.85">
        You
      </text>
      <text x="110" y="472" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="20" fill="#ffffff" opacity="0.92">
        Add the balloon on the top-right avatar.
      </text>
    </g>

    <!-- assistant -->
    <g filter="url(#cardShadow)">
      <rect x="136" y="520" width="640" height="104" rx="16" fill="#2a3a3d"></rect>
      <rect x="136" y="520" width="640" height="104" rx="16" fill="none" stroke="#c8fbff" stroke-opacity="0.12"></rect>
      <text x="162" y="555" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" fill="#c8fbff" opacity="0.85">
        Guide
      </text>
      <text x="162" y="582" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="20" fill="#ffffff" opacity="0.92">
        Use &lt;use width="520" height="240"&gt; when referencing symbols.
      </text>
    </g>

    <!-- scrollbar hint -->
    <rect x="794" y="150" width="8" height="480" rx="4" fill="#ffffff" opacity="0.08"></rect>
    <rect x="794" y="230" width="8" height="120" rx="4" fill="#ffffff" opacity="0.22"></rect>
  </g>
</svg>
